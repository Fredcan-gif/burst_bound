<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* A slightly softer pink background base */
            background-color: #fff0f0; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative; /* Needed for background elements */
        }

        /* --- NEW CSS FOR BACKGROUND FLOWERS --- */
        .bg-flower {
            position: fixed;
            z-index: -1; /* Ensure they stay behind everything */
            opacity: 0.6; /* Semi-transparent so they don't distract */
            pointer-events: none; /* Clicks pass straight through them */
            /* A gentle floating animation */
            animation: float 6s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(10deg); }
        }
        /* -------------------------------------- */

        .container {
            text-align: center;
            position: relative;
            z-index: 10; /* Keep main content above flowers */
        }

        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            margin-bottom: 20px;
            /* Strong white glow to ensure readability over flowers */
            text-shadow: 
                2px 2px 0px #fff, 
                -1px -1px 0 #fff,  
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff,
                0 0 15px rgba(255,255,255,0.8);
            position: relative;
            z-index: 100; 
            pointer-events: none; 
        }

        .gif-container img {
            width: 500px;
            height: auto;
            margin-bottom: 20px;
            /* Optional: add a white border/shadow to make GIF pop out from background */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.7));
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 60px;
            position: relative; 
            z-index: 10;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #ff4d4d;
            color: white;
            z-index: 1; 
        }

        #yesBtn:hover {
             background-color: #ff3333;
        }

        #noBtn {
            background-color: white;
            color: #ff4d4d;
            position: static;
            transition: all 0.5s ease-out;
            z-index: 10;
        }

        .hidden {
            display: none;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 999;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="container" id="question-screen">
        <div class="gif-container">
            <img src="../Valentines/shrek-puss-in-boots.gif" alt="Cute cat">
        </div>
        
        <h1 id="mainQuestion">Will you be my Valentine?</h1>
        
        <div class="btn-container">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden" id="celebration">
        <div class="gif-container">
            <img src="../Valentines/milk-milk-and-mocha.gif" alt="Happy Cat">
        </div>
        <h1>YEHEYYYY!<br>See you on the 14th!!! ❤️</h1>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionScreen = document.getElementById('question-screen');
        const celebration = document.getElementById('celebration');
        const mainQuestion = document.getElementById('mainQuestion');

        let currentYesScale = 1;

        const messages = [
            "Are you sure?", "Really sure?", "Think again!", "Last chance!",
            "Surely not?", "You might regret this!", "Give it another thought!",
            "Are you absolutely certain?", "This could be a mistake!", "Have a heart!",
            "Don't be so cold!", "Change of heart?", "Wouldn't you reconsider?",
            "Is that your final answer?", "You're breaking my heart ;(",
            "Why are you doing this?", "Don't do this to me!"
        ];

        // --- NEW FUNCTION TO CREATE BACKGROUND FLOWERS ---
        function createBackgroundFlowers() {
            // Using some reliable public URLs for flower/heart icons
            const images = [
                'https://cdn-icons-png.flaticon.com/128/833/833472.png', // Red Rose
                'https://cdn-icons-png.flaticon.com/128/2904/2904973.png', // Pink Flower
                'https://cdn-icons-png.flaticon.com/128/7449/7449643.png', // Heart flower
                'https://cdn-icons-png.flaticon.com/128/1077/1077035.png'  // Simple heart
            ];

            // Create 30 random background elements
            for (let i = 0; i < 30; i++) {
                const img = document.createElement('img');
                img.classList.add('bg-flower');
                // Pick a random image from the list
                img.src = images[Math.floor(Math.random() * images.length)];
                
                // Random positioning over the whole screen
                img.style.left = Math.random() * 100 + 'vw';
                img.style.top = Math.random() * 100 + 'vh';
                
                // Random size between 30px and 80px
                const size = Math.random() * 50 + 30;
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                
                // Random starting rotation for variety
                img.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                // Random animation delay so they don't all float in sync
                img.style.animationDelay = (Math.random() * 5) + 's';

                document.body.appendChild(img);
            }
        }

        // Initialize flowers on load
        createBackgroundFlowers();
        // --------------------------------------------------


        function moveNoButton() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const padding = 50; 
            const randomX = Math.random() * (windowWidth - btnWidth - padding * 2) + padding;
            const randomY = Math.random() * (windowHeight - btnHeight - padding * 2) + padding;

            noBtn.style.position = 'fixed'; 
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            currentYesScale += 0.2;
            yesBtn.style.transform = `scale(${currentYesScale})`;

            const randomIndex = Math.floor(Math.random() * messages.length);
            mainQuestion.innerText = messages[randomIndex];
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            moveNoButton();
        });

        yesBtn.addEventListener('click', () => {
            questionScreen.classList.add('hidden');
            celebration.classList.remove('hidden');
            createConfetti();
        });

        function createConfetti() {
            const colors = ['#ff4d4d', '#ff9999', '#ffcccc', '#ff0000', '#e60000'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }
    </script>
</body>
</html>
