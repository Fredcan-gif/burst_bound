<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            margin-bottom: 20px;
            /* This ensures text stays readable even if button grows behind it */
            text-shadow: 
                2px 2px 0px #fff, 
                -1px -1px 0 #fff,  
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;
            position: relative;
            z-index: 100; /* Text sits ON TOP of everything */
            pointer-events: none; /* Makes sure you can't accidentally click the text instead of the button */
        }

        .gif-container img {
            width: 500px;
            height: auto;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 60px;
            position: relative; 
            z-index: 10;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #ff4d4d;
            color: white;
            z-index: 1; /* Button stays BEHIND the text */
        }

        #yesBtn:hover {
             background-color: #ff3333;
        }

        #noBtn {
            background-color: white;
            color: #ff4d4d;
            position: static;
            transition: all 0.5s ease-out;
            z-index: 10;
        }

        .hidden {
            display: none;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 999;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="container" id="question-screen">
        <div class="gif-container">
            <img src="../Valentines/shrek-puss-in-boots.gif" alt="Cute cat">
        </div>
        
        <h1 id="mainQuestion">Will you be my Valentine?</h1>
        
        <div class="btn-container">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden" id="celebration">
        <div class="gif-container">
            <img src="../Valentines/milk-milk-and-mocha.gif" alt="Happy Cat">
        </div>
        <h1>YEHEYYYY!<br>See you on the 14th!!! ❤️</h1>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionScreen = document.getElementById('question-screen');
        const celebration = document.getElementById('celebration');
        const mainQuestion = document.getElementById('mainQuestion');

        // Track current scale of the Yes button
        let currentYesScale = 1;

        const messages = [
            "Are you sure?", "Really sure?", "Pls yes no no", "YES not no!",
            "Surely not?", "Pwease!", "Press on yes!",
            "Are you absolutely certain?", "Why did u click on no!", "YES?!",
            "Don't be so cold!", "Change of heart?", "Wouldn't you reconsider?",
            "Is that your final answer?", "You're breaking my heart :((",
            "Why are you doing this?", "Don't do this to me!"
        ];

        function moveNoButton() {
            // 1. Make the "No" button move smoothly
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const padding = 50; 
            const randomX = Math.random() * (windowWidth - btnWidth - padding * 2) + padding;
            const randomY = Math.random() * (windowHeight - btnHeight - padding * 2) + padding;

            noBtn.style.position = 'fixed'; 
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // 2. Make the "Yes" button grow (no moving down)
            currentYesScale += 0.2; // Increase scale by 20%
            yesBtn.style.transform = `scale(${currentYesScale})`;

            // 3. Change the text
            const randomIndex = Math.floor(Math.random() * messages.length);
            mainQuestion.innerText = messages[randomIndex];
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            moveNoButton();
        });

        yesBtn.addEventListener('click', () => {
            questionScreen.classList.add('hidden');
            celebration.classList.remove('hidden');
            createConfetti();
        });

        function createConfetti() {
            const colors = ['#ff4d4d', '#ff9999', '#ffcccc', '#ff0000', '#e60000'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }
    </script>
</body>
</html>
